name: Deploy to Firebase Hosting on PR
'on': pull_request
env:
  CI: ""
jobs:
  build_and_preview:
    if: '${{ github.event.pull_request.head.repo.full_name == github.repository }}'
    runs-on: ubuntu-latest
    steps:
      - name: Github Actions Checkout
        uses: actions/checkout@v4
      - name: Building Frontend
        run: npm ci && npm run build
      # PRs deploy to an ephemeral per-PR preview channel only (channelId omitted).
      # Never deploy to the live channel or functions from a PR — those happen
      # from `main` in firebase-hosting-merge.yml. See IMPROVEMENTS.md #C6.
      - name: Deploying Frontend to Preview Channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_NEARUAPPLICATION }}'
          projectId: nearuapplication
